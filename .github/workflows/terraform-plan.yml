name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run plan against"
        required: true
        type: string

env:
  TF_VERSION: "1.6.6"
  WORKING_DIR: "./terraform"

permissions:
  contents: read
  id-token: write

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA_EMAIL }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=keycloak/${{ github.event.inputs.environment }}"

      - name: Terraform Validate
        working-directory: ${{ env.WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="environment=${{ github.event.inputs.environment }}" \
            -out=tfplan \
            -no-color 2>&1 | tee plan-output.txt

      - name: Show Plan Output
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          echo "=============================="
          echo "Terraform Plan Output"
          echo "=============================="
          cat plan-output.txt

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.event.inputs.environment }}-${{ github.run_id }}
          path: ${{ env.WORKING_DIR }}/plan-output.txt
          retention-days: 7